name: Build Wine image

on:
  workflow_dispatch:
    inputs:
      wine_version:
        description: 'Wine version (e.g. 11.10)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  # Not ${{ github.repository }}: a package named "winebuilder" already exists
  # (pushed manually in the past) and is not linked to this repository, so
  # GITHUB_TOKEN cannot push to it. A fresh package name gets linked to the
  # repository automatically on first push.
  IMAGE_NAME: ${{ github.repository }}/wine

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Prepare platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "${GITHUB_ENV}"
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Persist the ccache directory to Actions cache to speed up rebuilds.
      # buildkit-cache-dance injects it into the BuildKit cache mount
      # (/root/.ccache) used by Dockerfile.release.
      - name: Restore ccache
        id: ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-${{ env.PLATFORM_PAIR }}-${{ inputs.wine_version }}
          restore-keys: |
            ccache-${{ env.PLATFORM_PAIR }}-
      - name: Inject ccache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              "ccache": "/root/.ccache"
            }
          skip-extraction: ${{ steps.ccache.outputs.cache-hit }}
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          platforms: ${{ matrix.platform }}
          build-args: |
            WINE_VERSION=${{ inputs.wine_version }}
          # Layer cache goes to the registry instead of Actions cache to
          # avoid the Actions cache size limit (10GB).
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ env.PLATFORM_PAIR }},mode=max,image-manifest=true,oci-mediatypes=true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      # Pass the input via env instead of interpolating it into the shell
      # script directly, to avoid command injection.
      WINE_VERSION: ${{ inputs.wine_version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${WINE_VERSION}" \
            --tag "${IMAGE}:latest" \
            $(printf "${IMAGE}@sha256:%s " *)
      - name: Inspect image
        run: docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${WINE_VERSION}"
      - name: Summary
        run: |
          {
            echo 'Image URL'
            echo '```'
            echo "${REGISTRY}/${IMAGE_NAME}:${WINE_VERSION}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

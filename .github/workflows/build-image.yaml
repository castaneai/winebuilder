name: Build Wine image

on:
  workflow_dispatch:
    inputs:
      wine_version:
        description: 'Wine version (e.g. 11.10)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  # Not ${{ github.repository }}: a package named "winebuilder" already exists
  # (pushed manually in the past) and is not linked to this repository, so
  # GITHUB_TOKEN cannot push to it. A fresh package name gets linked to the
  # repository automatically on first push.
  IMAGE_NAME: ${{ github.repository }}/wine
  # Disable build-push-action's job summary and the .dockerbuild build-record
  # artifact upload.
  DOCKER_BUILD_SUMMARY: false
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Prepare platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "${GITHUB_ENV}"
      - uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Persist the ccache directory to Actions cache to speed up rebuilds.
      # buildkit-cache-dance injects it into the BuildKit cache mount
      # (/root/.ccache) used by Dockerfile.release.
      - name: Restore ccache
        id: ccache
        uses: actions/cache@v5
        with:
          path: ccache
          key: ccache-${{ env.PLATFORM_PAIR }}-${{ inputs.wine_version }}
          restore-keys: |
            ccache-${{ env.PLATFORM_PAIR }}-
      - name: Inject ccache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          cache-map: |
            {
              "ccache": "/root/.ccache"
            }
          skip-extraction: ${{ steps.ccache.outputs.cache-hit }}
      # Each platform pushes a single-arch tag; the merge job combines them
      # into a multi-arch manifest. provenance is disabled to keep the pushed
      # manifests single-platform (no unknown/unknown attestation entries).
      - name: Build and push (single-arch tag)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          platforms: ${{ matrix.platform }}
          build-args: |
            WINE_VERSION=${{ inputs.wine_version }}
          provenance: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.wine_version }}-${{ env.PLATFORM_PAIR }}
          push: true
          # Layer cache goes to the registry instead of Actions cache to
          # avoid the Actions cache size limit (10GB).
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache-${{ env.PLATFORM_PAIR }},mode=max,image-manifest=true,oci-mediatypes=true

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      # Pass the input via env instead of interpolating it into the shell
      # script directly, to avoid command injection.
      WINE_VERSION: ${{ inputs.wine_version }}
    steps:
      - uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest from per-arch tags
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${WINE_VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${WINE_VERSION}-linux-amd64" \
            "${IMAGE}:${WINE_VERSION}-linux-arm64"
      - name: Inspect image
        run: docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${WINE_VERSION}"
